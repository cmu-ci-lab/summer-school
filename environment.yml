name: iccp-oct
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - ipykernel        # VSCode interactive window / Jupyter
  - opencv           # install OpenCV from conda-forge on macOS/Apple Silicon
  - pip:
      - numpy==2.4.6
      - scipy==1.18.0
      - matplotlib==3.11.0
      - Pillow==12.2.0
      - pyserial==3.5
      - pylablib==1.4.5
      - pyftdi

      # Camera SDKs are deliberately NOT part of the base environment — which
      # camera is used gets decided later. Install per vendor (see docs.html
      # "Camera SDK" section):
      #   Allied Vision : Vimba X SDK, then pip install its bundled vmbpy wheel
      #                   (vmbpy is NOT on PyPI; setup.sh finds the wheel).
      #   IDS uEye      : IDS Software Suite (ids-imaging.com), then
      #                   pip install pyueye (binding only — needs the Suite).
      # camera.py auto-detects whichever one is installed (AVT first, then IDS).
      #
      # Platform support:
      #   Windows : fully supported
      #   Ubuntu  : pylablib USB APT confirmed working; vmbpy needs Linux Vimba X SDK
      #   macOS   : stage uses pyftdi over libusb for the FTDI-based Thorlabs controller
      #             camera via Vimba X macOS .pkg → /Applications/VimbaX_*/api/python/vmbpy-*.whl
